# This topology boots the default-off `fast-timing` runtime wasm (SQ-128): a compressed epoch.length (21 × FAST_DAY = 84 blocks) so drill 09's "three unattended epochs" machinery proof runs three REAL epochs in minutes, not the release-cadence ~63 days. Test-only build; never a release artifact (09 §7.1; 13 §1).
# Bleavit local drill topology — 15 §4.7; 02 §8/§11; 09 §7.1.
[settings]
provider = "native"
# Zombienet timeouts are converted to 32-bit signed milliseconds, so any value
# above 2,147,483 s silently overflows (observed: 6,000,000 s collapsed to a
# 1 ms watchdog on the first G1 execution). The long-soak drill bounds live in
# per-step `within` clauses (each ≤ 2,000,000 s); this global value only guards
# network operations.
timeout = 1000
node_spawn_timeout = 240

[relaychain]
chain = "paseo-local"
chain_spec_path = "zombienet/specs/out/paseo-local.json"
default_command = "zombienet/bin/polkadot"
default_args = ["--no-hardware-benchmarks"]

[[relaychain.nodes]]
name = "relay-alice"
validator = true

[[relaychain.nodes]]
name = "relay-bob"
validator = true

[[relaychain.nodes]]
name = "relay-charlie"
validator = true

[[relaychain.nodes]]
name = "relay-dave"
validator = true

# Zombienet has no auxiliary-process stanza. This non-validator node entry
# gives the real B9 keeper a managed PID and Prometheus endpoint so it cranks
# the permissionless epoch extrinsics across the compressed epochs. The keeper
# is subxt-dynamic and reads the live epoch.length from chain, so it adapts to
# fast-timing with no rebuild.
[[relaychain.nodes]]
name = "keeper"
validator = false
command = "zombienet/scripts/keeper-node.sh"
substrate_cli_args_version = 2
prometheus_prefix = "bleavit"
args = ["--keeper-node-url=ws://127.0.0.1:19944", "--keeper-signer-uri=//Alice"]

[[parachains]]
id = 4242
chain_spec_path = "zombienet/specs/out/bleavit-drill-fast.json"
cumulus_based = true

[[parachains.collators]]
name = "bleavit-collator-1"
command = "target/release/bleavit-node"
rpc_port = 19944

[[parachains.collators]]
name = "bleavit-collator-2"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-3"
command = "target/release/bleavit-node"
