name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust workspace gates
        run: tools/ci/rust-workspace-gates.sh

  docs:
    name: Documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check local Markdown links
        run: python3 tools/ci/check-doc-links.py
